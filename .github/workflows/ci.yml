name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: pip install -e ".[dev]"
      - run: ruff check docflow/ tests/
      - run: ruff format --check docflow/ tests/
      - run: mypy docflow --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: docflow
          POSTGRES_PASSWORD: docflow
          POSTGRES_DB: docflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --cov=docflow --cov-report=term-missing
        env:
          DATABASE_URL: postgresql+asyncpg://docflow:docflow@localhost:5432/docflow
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t docflow:ci .
